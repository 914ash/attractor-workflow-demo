<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A minimalist habit tracker to form good routines.">
    <title>Minimalist Habit Tracker</title>
    <!-- Use a modern Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <header>
            <h1>Habits</h1>
            <p>What are we achieving today?</p>
        </header>

        <section class="add-habit-section">
            <form id="add-habit-form" aria-label="Add a new habit">
                <input type="text" id="habit-input" placeholder="e.g., Read 10 pages" required aria-label="Habit Name">
                <button type="submit" aria-label="Add Habit">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
            </form>
        </section>

        <section class="habits-list-section" aria-live="polite">
            <ul id="habits-list">
                <!-- Habits injected via JS -->
            </ul>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
